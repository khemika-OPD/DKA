<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKA/HHS Tool - Khemika OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-orange: #ff6b1e; --dark-border: #000; --soft-pink: #fff0f3;
            --mild: #27ae60; --mod: #f39c12; --severe: #d63031;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--soft-pink); margin: 0; padding: 5px; display: flex; justify-content: center; }
        .main-card { max-width: 480px; width: 100%; background: #fff; border-radius: 12px; border: 3px solid var(--dark-border); display: flex; flex-direction: column; }
        
        .header { background: linear-gradient(135deg, #ff6b1e, #e67e22); color: white; padding: 10px; text-align: center; border-bottom: 3px solid var(--dark-border); }
        .header h1 { margin: 0; font-size: 1rem; }
        .header p { margin: 1px 0; font-size: 0.75rem; font-weight: 700; }

        .body { padding: 15px; }
        .section-title { background: #eee; padding: 5px; font-weight: 700; border: 1px solid #000; margin: 10px 0; text-align: center; font-size: 0.9rem; }

        .input-group { margin-bottom: 15px; }
        .label { font-weight: 700; font-size: 0.85rem; color: #333; display: block; margin-bottom: 5px; }

        .radio-toolbar { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .radio-toolbar input[type="radio"] { display: none; }
        .radio-toolbar label {
            display: block; padding: 10px; background: #f8f9fa; border: 1px solid #ccc;
            border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .radio-toolbar input[type="radio"]:checked + label { background: #333; color: #fff; border-color: #000; }

        .result-box { margin-top: 15px; padding: 15px; border: 3px solid #000; border-radius: 10px; display: none; text-align: center; }
        .btn-calc { width: 100%; padding: 15px; background: var(--primary-orange); color: white; border: 2px solid #000; border-radius: 8px; font-weight: 700; font-family: 'Sarabun'; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>DKA & HHS Diagnostic Tool</h1>
        <p>พัฒนาโดย Khemika-OPD Takhli</p>
    </div>

    <div class="body">
        <div class="section-title">กรุณาเลือกค่าที่ตรวจพบ</div>

        <!-- Glucose -->
        <div class="input-group">
            <span class="label">1. ระดับน้ำตาลในเลือด (Glucose)</span>
            <div class="radio-toolbar">
                <input type="radio" name="glu" id="g1" value="dka"><label for="g1">≥ 200 mg/dL (หรือมีประวัติเบาหวาน)</label>
                <input type="radio" name="glu" id="g2" value="hhs"><label for="g2">≥ 600 mg/dL</label>
                <input type="radio" name="glu" id="g0" value="normal"><label for="g0">ปกติ / อื่นๆ</label>
            </div>
        </div>

        <!-- Ketones -->
        <div class="input-group">
            <span class="label">2. Ketones (Urine/Blood)</span>
            <div class="radio-toolbar">
                <input type="radio" name="ket" id="k1" value="mild_mod"><label for="k1">Urine ≥ 2+ หรือ Blood 3.0-6.0 mmol/L</label>
                <input type="radio" name="ket" id="k2" value="severe"><label for="k2">Blood > 6.0 mmol/L</label>
                <input type="radio" name="ket" id="k0" value="hhs"><label for="k0">Negative หรือ < 2+ (HHS)</label>
            </div>
        </div>

        <!-- Acidosis (pH / HCO3) -->
        <div class="input-group">
            <span class="label">3. ภาวะกรด (pH หรือ Bicarbonate)</span>
            <div class="radio-toolbar">
                <input type="radio" name="acid" id="a1" value="mild"><label for="a1">pH 7.25-7.30 หรือ HCO3 15-18 (Mild)</label>
                <input type="radio" name="acid" id="a2" value="mod"><label for="a2">pH 7.0-7.25 หรือ HCO3 10-15 (Mod)</label>
                <input type="radio" name="acid" id="a3" value="severe"><label for="a3">pH < 7.0 หรือ HCO3 < 10 (Severe)</label>
                <input type="radio" name="acid" id="a0" value="hhs"><label for="a0">pH ≥ 7.3 หรือ HCO3 ≥ 15 (HHS)</label>
            </div>
        </div>

        <!-- Mental Status -->
        <div class="input-group">
            <span class="label">4. ระดับความรู้สึกตัว (Mental Status)</span>
            <div class="radio-toolbar">
                <input type="radio" name="mental" id="m1" value="alert"><label for="m1">Alert (ตื่นดี)</label>
                <input type="radio" name="mental" id="m2" value="drowsy"><label for="m2">Drowsy (ง่วงซึม)</label>
                <input type="radio" name="mental" id="m3" value="stupor"><label for="m3">Stupor/Coma (ไม่รู้สึกตัว)</label>
            </div>
        </div>

        <button class="btn-calc" onclick="evaluateDKA()">ประเมินผลการคัดกรอง</button>

        <div id="result" class="result-box">
            <div id="diagText" style="font-weight: 700; font-size: 1.2rem; margin-bottom: 10px;"></div>
            <div id="careText" style="font-size: 0.9rem; line-height: 1.4;"></div>
        </div>
    </div>
</div>

<script>
    function evaluateDKA() {
        const glu = document.querySelector('input[name="glu"]:checked')?.value;
        const ket = document.querySelector('input[name="ket"]:checked')?.value;
        const acid = document.querySelector('input[name="acid"]:checked')?.value;
        const mental = document.querySelector('input[name="mental"]:checked')?.value;

        if (!glu || !ket || !acid || !mental) {
            alert("กรุณาเลือกข้อมูลให้ครบทุกหัวข้อค่ะ");
            return;
        }

        const resBox = document.getElementById('result');
        const dText = document.getElementById('diagText');
        const cText = document.getElementById('careText');
        resBox.style.display = "block";

        // Logic based on Table 2
        if (glu === "hhs" && ket === "hhs" && acid === "hhs") {
            dText.innerText = "วินิจฉัย: HHS";
            dText.style.color = "var(--severe)";
            cText.innerHTML = "<b>Suggested Care:</b> ICU / Intermediate Care<br>เน้นการคืนน้ำ (Rehydration) และดูแลระดับน้ำตาล";
        } else if (acid === "severe" || ket === "severe" || mental === "stupor") {
            dText.innerText = "วินิจฉัย: Severe DKA";
            dText.style.color = "var(--severe)";
            cText.innerHTML = "<b>Suggested Care:</b> Intensive Care Unit (ICU)<br>เฝ้าระวังระบบทางเดินหายใจและภาวะวิกฤตอย่างใกล้ชิด";
        } else if (acid === "mod" || mental === "drowsy") {
            dText.innerText = "วินิจฉัย: Moderate DKA";
            dText.style.color = "var(--mod)";
            cText.innerHTML = "<b>Suggested Care:</b> Step-down / Intermediate Care unit";
        } else {
            dText.innerText = "วินิจฉัย: Mild DKA";
            dText.style.color = "var(--mild)";
            cText.innerHTML = "<b>Suggested Care:</b> Regular ward or observation nursing unit";
        }
    }
</script>
</body>
</html>
